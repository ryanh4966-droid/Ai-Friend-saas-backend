<!DOCTYPE html>
<html>
<head>
  <title>AI Friend</title>
  <style>
    body { font-family: Arial; background:#111; color:white; text-align:center; }
    #chat { width:80%; margin:auto; height:400px; overflow:auto; border:1px solid #444; padding:10px; }
    .user { color:#4ea1ff; text-align:right; }
    .ai { color:#4dff88; text-align:left; }
    input { width:60%; padding:10px; }
    button { padding:10px; }
  </style>
</head>
<body>

<h2>AI Friend 🤖</h2>

<div id="chat"></div>

<br>

<input id="msg" placeholder="Type..." />
<button onclick="send()">Send</button>
<button onclick="voice()">🎤 Talk</button>

<script>
const chat = document.getElementById("chat");

function add(role, text) {
  const div = document.createElement("div");
  div.className = role;
  div.innerText = (role === "user" ? "You: " : "AI: ") + text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// SEND MESSAGE
async function send(textOverride) {
  const input = document.getElementById("msg");
  const text = textOverride || input.value;
  if (!text) return;

  add("user", text);
  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();
  add("ai", data.reply);

  speak(data.reply);
}

// VOICE INPUT
function voice() {
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang = "en-US";

  rec.onresult = (e) => {
    const text = e.results[0][0].transcript;
    send(text);
  };

  rec.start();
}

// TEXT TO SPEECH
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  speechSynthesis.speak(speech);
}
</script>

</body>
</html>
