<!DOCTYPE html>
<html>
<head>
<title>AI SaaS Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f1115;
    color: white;
    margin: 0;
}

.container {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #151922;
    padding: 20px;
}

.sidebar h2 {
    color: #4fc3f7;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.card {
    background: #1b2030;
    padding: 15px;
    border-radius: 10px;
}

.card h3 {
    margin: 0;
    color: #81c784;
}

/* CHAT */
#chat {
    margin-top: 20px;
    height: 300px;
    overflow-y: auto;
    background: #111521;
    padding: 10px;
    border-radius: 10px;
}

.user { color: #4fc3f7; }
.ai { color: #81c784; }

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    border: none;
}

button {
    background: #4fc3f7;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>AI SaaS</h2>
    <p id="plan">Plan: Free</p>
    <button onclick="upgrade()">Upgrade Pro</button>
</div>

<!-- MAIN -->
<div class="main">

<h1>Dashboard</h1>

<div class="cards">
    <div class="card">
        <h3 id="users">--</h3>
        <p>Total Users</p>
    </div>

    <div class="card">
        <h3 id="usage">--</h3>
        <p>Messages Used</p>
    </div>

    <div class="card">
        <h3 id="status">LIVE</h3>
        <p>System Status</p>
    </div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<input id="msg" placeholder="Ask AI...">
<button onclick="send()">Send</button>

</div>
</div>

<script>

const API = "https://ai-friend-saas-backend.onrender.com";
let token = localStorage.getItem("token");

// --------------------
// LOAD DASH DATA
// --------------------
async function load(){
    const res = await fetch(API);
    const data = await res.json();

    users.innerText = data.users;
}

// --------------------
// CHAT
// --------------------
async function send(){
    const m = msg.value;
    msg.value = "";

    add("user", m);

    const res = await fetch(API + "/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ message: m })
    });

    const data = await res.json();

    add("ai", data.reply || data.error);
}

// --------------------
// UI
// --------------------
function add(type, text){
    const div = document.createElement("div");
    div.className = type;
    div.innerText = text;
    chat.appendChild(div);
}

// --------------------
// UPGRADE FLOW
// --------------------
async function upgrade(){
    const res = await fetch(API + "/create-checkout", {
        method: "POST"
    });

    const data = await res.json();
    window.location.href = data.url;
}

load();

</script>

</body>
</html>
